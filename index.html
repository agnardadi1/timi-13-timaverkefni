<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timaverkefni Tími 13</title>
  </head>
  <body>
    <section>
      <h2>Æfing 1: Sækja notendur (users) og birta listann</h2>
      <ul id="user-list"></ul>
      <script>
        fetch("https://jsonplaceholder.typicode.com/users")
          .then((Response) => Response.json())
          .then((users) => {
            console.log("Gögnin okkar:", users);

            const userList = document.getElementById("user-list");
            users.forEach((user) => {
              const li = document.createElement("li");
              li.textContent = user.name;
              userList.appendChild(li);
            });
          })
          .catch((error) => {
            console.error("Villa kom upp:", error);
          });
      </script>
    </section>
    <section>
      <h2>Æfing 2: Sækja notendur með async/await og birta listann</h2>
      <ul id="user-list-async"></ul>
      <script>
        async function getUsers() {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users",
          );
          const users = await response.json();
          console.log("Gögnin okkar:", users);
          const list = document.getElementById("user-list-async");
          users.forEach((user) => {
            const li = document.createElement("li");
            li.textContent = user.name;
            list.appendChild(li);
          });
        }
        getUsers();
      </script>
    </section>
    <section>
      <h2>Æfing 3: Sækja notendur með error handling</h2>
      <ul id="status-invalid-url"></ul>
      <script>
        async function testInvalidUrl() {
          const status = document.getElementById("status-invalid-url");

          try {
            status.textContent = "Sæki gögn... ⏳";
            const response = await fetch(
              "https://jsonplaceholder.typicode.com/not-a-valid-url",
            );

            if (!response.ok) {
              throw new Error(`HTTP Villa: ${response.status}`);
            }

            status.textContent = "Gögn hlaðin inn! ✅";
          }
          }
        }

        // Call the function
        testInvalidUrl();
      </script>
    </section>
    <section>
      <h2>Æfing 4: Bæta við "hleð gögn" og feika að bíða eftir gögnum</h2>
      <ul id="user-list-status"></ul>
      <p id="status"></p>

      <script>
        function getUsersWithStatus() {
          const status = document.getElementById("status");
          const list = document.getElementById("user-list-status");
          status.textContent = "Hleð gögn...";
          setTimeout(() => {
            fetch("https://jsonplaceholder.typicode.com/users")
              .then((Response) => Response.json())
              .then((users) => {
                users.forEach((user) => {
                  const li = document.createElement("li");
                  li.textContent = user.email;
                  list.appendChild(li);
                });
                status.textContent = "Gögn hlaðin inn!";
              })
              .catch((error) => {
                console.error("Villa kom upp:", error);
              });
          }, 2000);
        }
        getUsersWithStatus();
      </script>
    </section>
    <section>
      <h2>Æfing 5: Stimpla inn nr pósts og sækja hann og birta síðan</h2>
      <div>
        <input id="post-id" type="number" min="1" max="100" step="1" />
        <button onclick="searchPost()">Leita póst</button>
      </div>
      <div id="post-info"></div>
      <script>
        async function searchPost() {
          const postId = document.getElementById("post-id").value;
          console.log("Postid er;", postId);
          const response = await fetch(
            `https://jsonplaceholder.typicode.com/posts/${postId}`,
          );
          const post = await response.json();
          console.log("Post okkar:", post);

          const postInfo = document.getElementById("post-info");
          postInfo.innerHTML = "";
          const title = document.createElement("h3");
          const body = document.createElement("p");
          title.textContent = post.title;
          body.textContent = post.body;

          postInfo.appendChild(title);
          postInfo.appendChild(body);
        }
      </script>
    </section>
  </body>
</html>
